services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: domdom
      POSTGRES_PASSWORD: domdom
      POSTGRES_DB: domdom
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domdom"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://domdom:domdom@db:5432/domdom?sslmode=disable
      JWT_SECRET: doi-secret-nay-trong-production
      ADMIN_EMAIL: admin@domdom.vn
      ADMIN_PASSWORD: domdom123
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  admin:
    build: ./admin
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  dbdata:
